<style>

<script>
// ============================================================
// ESTADO
// ============================================================
let DATA = null;
let state = {
  view: 'sala',        // sala | movie | time
  selectedDate: null,  // YYYY-MM-DD
  cinemas: {},         // id -> bool (visible)
  search: '',
};

// ============================================================
// CARGA INICIAL
// ============================================================
async function load() {
  try {
    const r = await fetch('./data/schedule.json?ts=' + Date.now());
    DATA = await r.json();
  } catch (e) {
    document.getElementById('main').innerHTML =
      '<div class="empty">No se ha podido cargar la programación. ¿Está generado <code>data/schedule.json</code>?</div>';
    return;
  }
  // Inicializar estado
  state.cinemas = Object.fromEntries(DATA.cinemas.map(c => [c.id, true]));
  state.selectedDate = today();
  document.addEventListener('input', (e) => {
  if (e.target.id === 'movie-search') {
    state.search = e.target.value;
    render();
  }
});
  render();
}

function today() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

// ============================================================
// HELPERS
// ============================================================
const ratingClass = r => 'rating-' + (r === 'TP' ? 'TP' : r === '+7' ? '7' : r === '+12' ? '12' : r === '+16' ? '16' : r === '+18' ? '18' : 'X');

const fmtDate = (iso) => {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
};
const fmtDayShort = (iso) => {
  const d = new Date(iso + 'T00:00:00');
  return {
    weekday: d.toLocaleDateString('es-ES', { weekday: 'short' }),
    day: d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })
  };
};

const parseTime = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
const fmtMin = mins => `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;

const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// Filtro principal: sesiones del día seleccionado, en cines visibles
function filteredCinemas() {
  return DATA.cinemas
    .filter(c => state.cinemas[c.id])
    .map(c => ({
      ...c,
      sessions: c.sessions.filter(s => {
        if (s.date !== state.selectedDate) return false;

        if (!state.search) return true;

        const q = state.search.toLowerCase();

        return (
          s.movie.toLowerCase().includes(q) ||
          c.name.toLowerCase().includes(q) ||
          (s.sala || '').toLowerCase().includes(q)
        );
      })
    }));
}

// ============================================================
// RENDER UI: BARRAS SUPERIORES
// ============================================================
function renderTopBars() {
  // Subtítulo
  document.getElementById('subtitle').textContent = fmtDate(state.selectedDate);

  // Pestañas de día
  const days = new Set();
  DATA.cinemas.forEach(c => c.sessions.forEach(s => days.add(s.date)));
  const sortedDays = [...days].sort().filter(d => d >= today());
  document.getElementById('day-tabs').innerHTML = sortedDays.slice(0, 7).map(d => {
    const { weekday, day } = fmtDayShort(d);
    const active = d === state.selectedDate ? 'active' : '';
    return `<button class="day-tab ${active}" onclick="setDate('${d}')"><strong>${weekday}</strong>${day}</button>`;
  }).join('');

  // Pills de cines
  document.getElementById('cinema-pills').innerHTML = DATA.cinemas.map(c => {
    const active = state.cinemas[c.id];
    const style = active ? `style="background:${c.color};border-color:${c.color}"` : '';
    return `<button class="pill ${active ? 'cinema-active' : ''}" ${style} onclick="toggleCinema('${c.id}')">${escapeHtml(c.name)}</button>`;
  }).join('');

  // Selector de vista
  document.getElementById('view-switcher').innerHTML = [
    ['sala', '🏛️ Por sala'],
    ['movie', '🎬 Por película'],
    ['time', '🕒 Por horario'],
  ].map(([id, label]) =>
    `<button class="view-btn ${state.view === id ? 'active' : ''}" onclick="setView('${id}')">${label}</button>`
  ).join('');
}

// ============================================================
// VISTA POR SALA
// ============================================================
function renderBySala() {
  const cinemas = filteredCinemas();
  if (cinemas.every(c => c.sessions.length === 0)) {
    return '<div class="empty">No hay sesiones para este día con los cines seleccionados.</div>';
  }
  return cinemas.map(cinema => {
    if (cinema.sessions.length === 0) return '';

    // Agrupar por sala
    const bySala = {};
    cinema.sessions.forEach(s => {
      const k = s.sala || '?';
      (bySala[k] = bySala[k] || []).push(s);
    });
    Object.values(bySala).forEach(arr => arr.sort((a, b) => parseTime(a.time) - parseTime(b.time)));
    const salaNames = Object.keys(bySala).sort();

    return `
      <section class="cinema-section">
        <div class="cinema-header">
          <div class="cinema-dot" style="background:${cinema.color}"></div>
          <div class="cinema-name">${escapeHtml(cinema.name)}</div>
          <div class="cinema-meta">· ${escapeHtml(cinema.area)}</div>
          <div class="cinema-count">${salaNames.length} sala${salaNames.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="salas-grid">
          ${salaNames.map(salaName => `
            <div class="sala-card">
              <div class="sala-title">${escapeHtml(salaName)}</div>
              <div class="sessions">
                ${bySala[salaName].map(s => sessionCard(s, cinema.color)).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    `;
  }).join('');
}

function sessionCard(s, color) {
  const endMin = s.duration ? fmtMin(parseTime(s.time) + s.duration) : null;
  return `
    <a class="session" href="${escapeHtml(s.url)}" target="_blank" rel="noopener" style="border-left-color:${color}">
      <div class="session-top">
        <span class="session-time">${escapeHtml(s.time)}</span>
        <span class="session-rating ${ratingClass(s.rating)}">${escapeHtml(s.rating)}</span>
      </div>
      <div class="session-movie">${escapeHtml(s.movie)}</div>
      <div class="session-meta">
        ${s.duration ? `⏱ ${s.duration} min${endMin ? ` · termina ~${endMin}` : ''}` : ''}
      </div>
    </a>
  `;
}

// ============================================================
// VISTA POR PELÍCULA
// ============================================================
function renderByMovie() {
  const cinemas = filteredCinemas();
  const movies = {};
  cinemas.forEach(cinema => {
    cinema.sessions.forEach(s => {
      const k = s.movie;
      if (!movies[k]) movies[k] = { movie: k, rating: s.rating, duration: s.duration, byCinema: {} };
      if (!movies[k].byCinema[cinema.id]) movies[k].byCinema[cinema.id] = { cinema, sessions: [] };
      movies[k].byCinema[cinema.id].sessions.push(s);
    });
  });
  const list = Object.values(movies).sort((a, b) => a.movie.localeCompare(b.movie, 'es'));
  if (list.length === 0) return '<div class="empty">No hay sesiones para este día.</div>';

  return `<div class="movies-list">${list.map(m => `
    <div class="movie-card">
      <div class="movie-title">
        <span>${escapeHtml(m.movie)}</span>
        <span class="movie-meta">
          ${m.duration ? `${m.duration} min` : ''}
          <span class="session-rating ${ratingClass(m.rating)}">${escapeHtml(m.rating)}</span>
        </span>
      </div>
      ${Object.values(m.byCinema).map(({ cinema, sessions }) => `
        <div class="cinema-row">
          <span class="cinema-label" style="color:${cinema.color}">${escapeHtml(cinema.name)}:</span>
          ${sessions.sort((a,b) => parseTime(a.time) - parseTime(b.time)).map(s => `
            <a class="time-chip" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">
              ${escapeHtml(s.time)}
              ${s.sala && s.sala !== '?' && s.sala !== 'Sala única' ? `<span class="sala-tag">${escapeHtml(s.sala)}</span>` : ''}
            </a>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `).join('')}</div>`;
}

// ============================================================
// VISTA POR HORARIO
// ============================================================
function renderByTime() {
  const cinemas = filteredCinemas();
  const all = [];
  cinemas.forEach(c => c.sessions.forEach(s => all.push({ ...s, cinema: c })));
  all.sort((a, b) => parseTime(a.time) - parseTime(b.time));
  if (all.length === 0) return '<div class="empty">No hay sesiones para este día.</div>';

  // Agrupar por hora
  const byHour = {};
  all.forEach(s => {
    const h = Math.floor(parseTime(s.time) / 60);
    (byHour[h] = byHour[h] || []).push(s);
  });

  return Object.entries(byHour).map(([h, sessions]) => `
    <div class="hour-block">
      <div class="hour-label">
        <div class="hour-num">${String(h).padStart(2,'0')}:00</div>
        <div class="hour-line"></div>
      </div>
      <div class="hour-grid">
        ${sessions.map(s => sessionCardWithCinema(s)).join('')}
      </div>
    </div>
  `).join('');
}

function sessionCardWithCinema(s) {
  const endMin = s.duration ? fmtMin(parseTime(s.time) + s.duration) : null;
  return `
    <a class="session" href="${escapeHtml(s.url)}" target="_blank" rel="noopener" style="border-left-color:${s.cinema.color}">
      <div class="session-top">
        <span class="session-time">${escapeHtml(s.time)}</span>
        <span class="session-rating ${ratingClass(s.rating)}">${escapeHtml(s.rating)}</span>
      </div>
      <div class="session-movie">${escapeHtml(s.movie)}</div>
      <div class="session-meta">
        <span style="color:${s.cinema.color}">●</span>
        ${escapeHtml(s.cinema.name)}
        ${s.sala && s.sala !== '?' ? ` · ${escapeHtml(s.sala)}` : ''}
        ${s.duration ? ` · ${s.duration}min` : ''}
      </div>
    </a>
  `;
}

// ============================================================
// RENDER PRINCIPAL
// ============================================================
function render() {
  renderTopBars();
  let html = '';
  if (state.view === 'sala') html = renderBySala();
  else if (state.view === 'movie') html = renderByMovie();
  else if (state.view === 'time') html = renderByTime();
  document.getElementById('main').innerHTML = html;

  if (DATA.generatedAt) {
    document.getElementById('updated').textContent =
      'Actualizado: ' + new Date(DATA.generatedAt).toLocaleString('es-ES');
  }
}

// ============================================================
// HANDLERS (globales para los onclick inline)
// ============================================================
window.setView = (v) => { state.view = v; render(); };
window.setDate = (d) => { state.selectedDate = d; render(); };
window.toggleCinema = (id) => { state.cinemas[id] = !state.cinemas[id]; render(); };
window.quickFilter = (type) => {

  const input = document.getElementById('movie-search');

  if (type === 'family') {
    state.search = 'tp';
  }

  if (type === 'vose') {
    state.search = 'vose';
  }

  if (type === 'short') {
    state.search = '90';
  }

  if (type === 'late') {
    state.view = 'time';
  }

  input.value = state.search;

  render();
};

window.randomMovie = () => {

  const cinemas = filteredCinemas();

  const all = [];

  cinemas.forEach(c => {
    c.sessions.forEach(s => {
      all.push({ ...s, cinema: c.name });
    });
  });

  if (!all.length) return;

  const random = all[Math.floor(Math.random() * all.length)];

  state.search = random.movie;

  document.getElementById('movie-search').value = random.movie;

  render();

  window.scrollTo({
    top: 500,
    behavior: 'smooth'
  });
};
load();
</script>
</body>
</html>
