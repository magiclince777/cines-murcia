name: Scrape cines

on:
  schedule:
    # Todos los días a las 6:30 UTC (≈ 8:30 hora de Murcia)
    - cron: '30 6 * * *'
  workflow_dispatch:  # permite lanzarlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          mkdir -p data
          python scraper.py > data/schedule.json

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: actualizar programación $(date -u +%Y-%m-%d)"
            git push
          fi
